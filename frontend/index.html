<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Azure Pricing Calculator (Demo)</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="header-logo">
        <svg width="20" height="20" viewBox="0 0 96 96" fill="none">
          <path d="M33.7 26H58.9L36.5 71.4L10 71.3L33.7 26Z" fill="#fff"/>
          <path d="M53.5 32.8L62.1 47.7L41 71.4H68.3L86 71.3L53.5 32.8Z" fill="#fff" opacity="0.8"/>
        </svg>
        <span>Azure Pricing Calculator</span>
        <span class="header-badge">Demo</span>
      </div>
    </div>
  </header>

  <main class="main">
    <section class="service-picker" id="service-picker">
      <h2 class="section-title">Add a service to your estimate</h2>
      <div class="service-grid" id="service-grid">
        <!-- Rendered by service-picker.js -->
      </div>
    </section>

    <section class="estimate-panel" id="estimate-panel">
      <h2 class="section-title">Your Estimate</h2>
      <div class="estimate-empty" id="estimate-empty">
        <p>No items yet. Click <strong>+ Add</strong> on a service above to begin.</p>
      </div>
      <div class="estimate-list" id="estimate-list">
        <!-- Rendered by estimate-list.js -->
      </div>
    </section>
  </main>

  <footer class="summary-bar" id="summary-bar">
    <div class="summary-inner">
      <div class="summary-label">Estimated monthly cost</div>
      <div class="summary-total" id="summary-total">$0.00</div>
      <div class="summary-currency">USD</div>
    </div>
    <div class="summary-disclaimer">
      Demo only — prices from Azure Global API (USD). Not for production use.
    </div>
  </footer>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
